---
name: python
"on": pull_request
permissions:
  contents: read
  packages: read
jobs:
  mcvs-python-action:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
